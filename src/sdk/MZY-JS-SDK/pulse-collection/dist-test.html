<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>脉诊采集 · 设备联调工具</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #17202a;
      background: #f4f7fb;
      --primary: #1f6feb;
      --primary-foreground: #ffffff;
      --muted: #f4f4f4;
      --border: #e5e5e5;
      --card: #ffffff;
      --radius: 10px;
      --transition: 0.2s ease;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 32px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
    }

    .hint {
      margin: 6px 0 0;
      color: #5d6d7e;
      font-size: 14px;
    }

    .status-badge {
      min-width: 220px;
      padding: 10px 14px;
      border: 1px solid #d5dde8;
      border-radius: 8px;
      background: #ffffff;
      font-size: 14px;
      font-weight: 500;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    section {
      padding: 16px 18px;
      border: 1px solid #d5dde8;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
    }

    section.wide {
      grid-column: 1 / -1;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 600;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    button {
      min-height: 36px;
      padding: 0 14px;
      border: 1px solid #b8c4d4;
      border-radius: 8px;
      background: #f9fbfe;
      color: #17202a;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    button.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--primary-foreground);
    }

    button.warn {
      background: #b42318;
      border-color: #b42318;
      color: white;
    }

    button:hover {
      filter: brightness(0.96);
    }

    input {
      min-height: 36px;
      width: 200px;
      padding: 0 12px;
      border: 1px solid #b8c4d4;
      border-radius: 8px;
      font: inherit;
    }

    pre {
      overflow: auto;
      min-height: 240px;
      max-height: 360px;
      margin: 0;
      padding: 12px;
      border-radius: 8px;
      color: #d6e4ff;
      background: #111827;
      font-size: 13px;
      line-height: 1.6;
    }

    .check-tab-group {
      display: flex;
      background: #f4f4f4;
      border-radius: 8px;
      padding: 3px;
      border: 1px solid #e0e0e0;
      width: fit-content;
    }

    .tab-option {
      position: relative;
      padding: 6px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: #444;
      transition: color 0.2s, background 0.2s;
      white-space: nowrap;
      user-select: none;
      background: transparent;
      border: none;
      outline: none;
      line-height: 1.4;
    }

    .tab-option.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 2px 6px rgba(31, 111, 235, 0.3);
    }

    #chart-container {
      width: 100%;
      height: 320px;
    }

    @media (max-width: 780px) {

      header,
      .grid {
        display: block;
      }

      section {
        margin-top: 14px;
      }
    }
  </style>
</head>

<body>
  <main>
    <header>
      <div>
        <h1>脉诊采集 · 联调控制台</h1>
        <p class="hint">基于 PulseCollectionClient 实时测量与指令调试</p>
      </div>
      <div class="status-badge">
        🔌 串口状态：<strong id="openState">未连接</strong>
      </div>
    </header>

    <div class="grid">
      <section>
        <h2>🔗 连接管理</h2>
        <div class="actions">
          <button id="btnConnect" class="primary">📡 连接设备</button>
          <button id="btnDisconnect" class="warn">🔒 断开连接</button>
          <button id="btnGetPorts">📋 已授权端口</button>
          <button id="btnSnapshot">📸 快照</button>
          <button id="btnClear">🗑️ 清空缓存</button>
        </div>
      </section>

      <section>
        <h2>⚡ 采集控制</h2>
        <div class="actions" style="flex-wrap: wrap; align-items: center;">
          <div class="check-tab-group" id="modeTabGroup">
            <button class="tab-option" data-mode="standard">📊 标准模式</button>
            <button class="tab-option active" data-mode="fast">⚡ 快速模式</button>
          </div>
          <div class="check-tab-group" id="handTabGroup">
            <button class="tab-option active" data-hand="left">左手</button>
            <button class="tab-option" data-hand="right">右手</button>
          </div>
          <button id="btnStartCollect" class="primary">▶ 开始采集</button>
          <button id="btnStopCollect" class="warn">⏹️ 停止</button>
        </div>
        <p style="font-size:12px; color:#5d6d7e; margin:8px 0 0;">当前模式：<span id="currentModeLabel">快速采集 · 左手</span></p>
      </section>

      <section>
        <h2>🕹️ 探头控制</h2>
        <div class="actions">
          <button id="btnEnterSearch">🔍 手动寻脉</button>
          <button id="btnMoveUp">⬆️ 上移</button>
          <button id="btnMoveDown">⬇️ 下移</button>
          <button id="btnMoveForward">⏩ 前伸</button>
          <button id="btnMoveBack">⏪ 回缩</button>
          <button id="btnAllowHandSearch">🔓 允许手动寻脉</button>
          <button id="btnRejectHandSearch">❌ 拒绝手动寻脉</button>
        </div>
      </section>

      <section>
        <h2>📟 设备信息</h2>
        <div class="actions">
          <button id="btnDeviceStatus">📊 状态</button>
          <button id="btnReadNo">🆔 读取编号</button>
          <input id="deviceNo" value="MZY-DEVICE-0001" placeholder="设备号" />
        </div>
      </section>

      <section class="wide">
        <h2>📈 实时脉图（寸·关·尺）</h2>
        <div id="chart-container"></div>
      </section>

      <section class="wide">
        <h2>📋 事件日志</h2>
        <pre id="log"></pre>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script type="module">
    import {
      COLLECTION_DEFAULT_OPTIONS,
      PulseCollectionClient
    } from './dist/mzy_pulse_collection.esm.js';

    const logEl = document.getElementById('log');
    const openStateEl = document.getElementById('openState');
    const deviceNoInput = document.getElementById('deviceNo');
    const modeLabel = document.getElementById('currentModeLabel');

    const client = PulseCollectionClient.create({
      verboseFrameLog: false,
    });

    let currentCollectMode = 1;   // 0=标准，1=快速
    let currentHand = 1;         // 1=左手，2=右手

    function log(title, data) {
      const time = new Date().toLocaleTimeString();
      const text = data === undefined ? '' : (typeof data === 'string' ? ` ${data}` : ` ${JSON.stringify(data)}`);
      if (logEl) logEl.textContent = `[${time}] ${title}${text}\n` + logEl.textContent;
      console.log(title, data);
    }

    function updateOpenState() {
      if (openStateEl) openStateEl.textContent = client.isOpen ? '已连接' : '未连接';
    }

    function updateModeLabel() {
      const modeStr = currentCollectMode === 0 ? '标准采集' : '快速采集';
      const handStr = currentHand === 1 ? '左手' : '右手';
      if (modeLabel) modeLabel.textContent = `${modeStr} · ${handStr}`;
    }

    async function run(title, task) {
      try {
        const result = await task();
        updateOpenState();
        log(`${title} 成功`, result);
      } catch (error) {
        updateOpenState();
        log(`${title} 失败`, error?.message || String(error));
      }
    }

    async function connectDevice() {
      try {
        await client.requestPort();
        log('选择串口 成功');
        await client.open();
        log('打开串口 成功');
        updateOpenState();
      } catch (error) {
        updateOpenState();
        log('连接设备 失败', error?.message || String(error));
      }
    }

    const chartDom = document.getElementById('chart-container');
    const MAX_POINTS = 100;
    const xAxisData = new Array(MAX_POINTS).fill('');
    const cunSeries = new Array(MAX_POINTS).fill(null);
    const guanSeries = new Array(MAX_POINTS).fill(null);
    const chiSeries = new Array(MAX_POINTS).fill(null);
    let chartInstance = null;
    const PULSE_COLORS = ['#F75A5A', '#1FC17D', '#4082FC'];

    function getEchartsOption() {
      return {
        color: PULSE_COLORS,
        animation: false,
        tooltip: { trigger: 'axis' },
        grid: { left: '6%', top: '12%', right: '2%', bottom: '5%' },
        legend: { data: ['寸', '关', '尺'], x: 'right' },
        xAxis: {
          type: 'category',
          boundaryGap: false,
          data: xAxisData,
          show: false
        },
        yAxis: {
          type: 'value',
          min: 1200,
          max: 1800
        },
        series: [
          { name: '寸', type: 'line', data: cunSeries, showSymbol: false, smooth: true },
          { name: '关', type: 'line', data: guanSeries, showSymbol: false, smooth: true },
          { name: '尺', type: 'line', data: chiSeries, showSymbol: false, smooth: true }
        ]
      };
    }

    function initChart() {
      if (!chartDom || !window.echarts) return;
      if (chartInstance) chartInstance.dispose();
      try {
        chartInstance = echarts.init(chartDom);
        chartInstance.setOption(getEchartsOption());
        console.log('echarts 初始化完成');
      } catch (e) {
        console.error('echarts 初始化失败', e);
      }
    }

    if (window.echarts) {
      initChart();
    } else {
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js';
      script.onload = () => initChart();
      script.onerror = () => console.error('echarts CDN 加载失败');
      document.head.appendChild(script);
    }

    window.addEventListener('resize', () => {
      if (chartInstance) chartInstance.resize();
    });

    function pushMeasurementPoint(timeStr, cadval, gadval, chadval) {
      xAxisData.push(timeStr);
      xAxisData.shift();
      cunSeries.push(cadval);
      cunSeries.shift();
      guanSeries.push(gadval);
      guanSeries.shift();
      chiSeries.push(chadval);
      chiSeries.shift();

      if (chartInstance && !chartInstance.isDisposed()) {
        chartInstance.setOption({
          xAxis: { data: [...xAxisData] },
          series: [
            { data: [...cunSeries] },
            { data: [...guanSeries] },
            { data: [...chiSeries] }
          ]
        }, false);
      }
    }

    function handleMeasurementEvent(evt) {
      const m = evt.measurement || {};
      const timeLabel = new Date().toLocaleTimeString();
      const cadval = m.cadval != null ? m.cadval + 100 : null;
      const gadval = m.gadval ?? null;
      const chadval = m.chadval != null ? m.chadval - 100 : null;
      if (cadval !== null || gadval !== null || chadval !== null) {
        pushMeasurementPoint(timeLabel, cadval, gadval, chadval);
      }
    }

    function handleCollectionCompleted(result) {
      log('✅ 采集完成', result);
    }

    client
      .onMeasurement((data) => {
        handleMeasurementEvent(data);
      })
      .onPulseRecord((record) => log('📋 脉象记录', record))
      .onPulseGroup((group) => log('📁 脉象组', group))
      .onCollectionCompleted(handleCollectionCompleted)
      .onDeviceNo((data) => {
        log('ℹ️ 设备号', data);
        if (deviceNoInput) deviceNoInput.value = data;
      })
      .onDeviceStatus((flag) => log('🔔 设备状态', flag))
      .onStatusChange((status) => log('🔄 采集业务状态变更', status))
      .onLog((message) => log('📝 日志', message))
      .onError((message) => log('❌ 错误', message));

    function setupCheckTab(groupId, onChange) {
      const group = document.getElementById(groupId);
      if (!group) return;
      const buttons = group.querySelectorAll('.tab-option');
      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          buttons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          if (typeof onChange === 'function') {
            onChange(btn);
          }
        });
      });
    }

    // 采集方式切换：0=标准模式，1=快速模式
    setupCheckTab('modeTabGroup', (activeBtn) => {
      const mode = activeBtn.getAttribute('data-mode');
      currentCollectMode = mode === 'standard' ? 0 : 1;
      updateModeLabel();
      log('🔄 切换采集方式', { mode: currentCollectMode === 1 ? '1=快速模式' : '0=标准模式' });
    });

    // 左右手切换
    setupCheckTab('handTabGroup', (activeBtn) => {
      const hand = activeBtn.getAttribute('data-hand');
      currentHand = hand === 'right' ? 2 : 1;
      updateModeLabel();
      run('设置左右手', () => client.setHandModel(currentHand));
    });

    document.getElementById('btnConnect').onclick = () => connectDevice();
    document.getElementById('btnDisconnect').onclick = () => run('断开连接', () => client.close());
    document.getElementById('btnGetPorts').onclick = () => run('读取授权串口', async () => {
      const ports = await client.getPorts();
      return { count: ports.length };
    });
    document.getElementById('btnSnapshot').onclick = () => log('当前快照', client.getSnapshot());
    document.getElementById('btnClear').onclick = () => {
      client.clear();
      updateOpenState();
      log('缓存已清空');
    };

    document.getElementById('btnStartCollect').onclick = () => {
      const modeParam = currentCollectMode;
      const side = currentHand;
      run(`开始采集 (${currentCollectMode === 0 ? '0=标准模式' : '1=快速模式'})`, () => client.start(modeParam, side));
    };

    document.getElementById('btnStopCollect').onclick = () => run('停止采集', () => client.stop());
    document.getElementById('btnEnterSearch').onclick = () => run('进入手动寻脉', () => client.enterHandSearch());
    document.getElementById('btnMoveUp').onclick = () => run('上移', () => client.setMoveUp());
    document.getElementById('btnMoveDown').onclick = () => run('下移', () => client.setMoveDown());
    document.getElementById('btnMoveForward').onclick = () => run('前伸', () => client.setMoveForward());
    document.getElementById('btnMoveBack').onclick = () => run('回缩', () => client.setMoveBack());
    document.getElementById('btnAllowHandSearch').onclick = () => run('允许手动寻脉', () => client.allowHandSearch());
    document.getElementById('btnRejectHandSearch').onclick = () => run('拒绝手动寻脉', () => client.rejectHandSearch());
    document.getElementById('btnDeviceStatus').onclick = () => run('读取设备状态', () => client.getDeviceStatus());
    document.getElementById('btnReadNo').onclick = () => run('读取设备号', () => client.readDeviceNo());

    // 初始化显示状态与默认值一致
    updateOpenState();
    updateModeLabel();
  </script>
</body>

</html>
